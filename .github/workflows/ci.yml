name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel old runs on the same branch when a newer commit lands.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: typecheck / lint / test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        # ci is the deterministic install — fails the build if package-lock
        # is out of sync, which matches our Railway start path.
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: TypeScript strict typecheck
        run: npm run typecheck

      - name: ESLint
        run: npm run lint

      - name: Unit tests
        run: npm test

  build:
    name: production build
    runs-on: ubuntu-latest
    needs: quality
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npx prisma generate

      - name: Build (server + client)
        # Mirrors the Railway build script. Fails CI if vite-plugin-pwa or
        # tsc-build break — gives us a red flag BEFORE prod redeploys.
        run: npm run build

      # Sanity: artefacts exist where the start script will look for them.
      - name: Verify build artefacts
        run: |
          test -f dist/server/server/index.js
          test -f dist/client/index.html
